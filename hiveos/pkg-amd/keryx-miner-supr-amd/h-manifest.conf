# HiveOS custom-miner manifest for keryx-miner-supr (AMD / OpenCL build).
# Installed to /hive/miners/custom/keryx-miner-supr-amd/ on the rig.
# Distinct name from the NVIDIA package so both can coexist on one host.

CUSTOM_NAME=keryx-miner-supr-amd
CUSTOM_VERSION=0.6.2
CUSTOM_BUILD=1

# Where h-run.sh writes the miner log and h-stats.sh reads it from.
# HiveOS appends ".log" itself.
CUSTOM_LOG_BASENAME=/var/log/miner/keryx-miner-supr-amd/keryx-miner-supr-amd

# Config file produced by h-config.sh and consumed by h-run.sh.
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/keryx-miner-supr-amd/keryx.conf
