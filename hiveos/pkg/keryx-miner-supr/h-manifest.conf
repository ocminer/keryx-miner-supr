# HiveOS custom-miner manifest for keryx-miner-supr
# Installed to /hive/miners/custom/keryx-miner-supr/ on the rig.

CUSTOM_NAME=keryx-miner-supr
CUSTOM_VERSION=0.5.4
CUSTOM_BUILD=1

# Where h-run.sh writes the miner log and h-stats.sh reads it from.
# HiveOS appends ".log" itself.
CUSTOM_LOG_BASENAME=/var/log/miner/keryx-miner-supr/keryx-miner-supr

# Config file produced by h-config.sh and consumed by h-run.sh.
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/keryx-miner-supr/keryx.conf
